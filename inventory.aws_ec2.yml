plugin: amazon.aws.aws_ec2
regions:
  - ap-southeast-1
filters:
  instance-state-name: running
keyed_groups:
  - prefix: tag_Name
    key: tags.Name
  - prefix: tag_Environment
    key: tags.Environment
hostnames:
  - instance-id

compose:
  # ใช้ SSH + EC2 Key Pair — EC2 อยู่ใน Private Subnet
  # Semaphore ต้องอยู่ใน VPC เดียวกันจึงจะ SSH ผ่าน Private IP ได้
  ansible_connection: "'ssh'"
  ansible_user: "'ubuntu'"
  ansible_python_interpreter: "'/usr/bin/python3'"
  ansible_become_exe: "'sudo'"
  ansible_host: private_ip_address
