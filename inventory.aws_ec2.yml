plugin: amazon.aws.aws_ec2
regions:
  - ap-southeast-1
filters:
  instance-state-name: running
keyed_groups:
  - prefix: tag_Name
    key: tags.Name
  - prefix: tag_Environment
    key: tags.Environment
hostnames:
  - instance-id

compose:
  # SSH over SSM: ใช้ SSH เป็น protocol แต่วิ่งผ่าน SSM tunnel — ไม่ต้องเปิด Port 22 สู่ Internet
  # %h ใน ProxyCommand จะใช้ instance_id (เช่น i-0abc123) เป็น target
  ansible_connection: "'ssh'"
  ansible_user: "'ubuntu'"
  ansible_python_interpreter: "'/usr/bin/python3'"
  ansible_become_exe: "'sudo'"
  # ต้องใช้ instance_id (i-xxx) เป็น host เพื่อให้ SSM ProxyCommand รู้ว่าจะต่อไป EC2 ตัวไหน
  ansible_host: instance_id
